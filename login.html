<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>تسجيل الدخول - التحقق عبر واتساب</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#e2e8f0}
    .card{background:rgba(30,41,59,.92);border:1px solid rgba(255,255,255,.08);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.45);width:100%;max-width:420px;padding:28px}
    .title{display:flex;gap:8px;align-items:center;justify-content:center;color:#60a5fa;font-weight:700;font-size:22px;margin-bottom:8px}
    .subtitle{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:16px}
    .group{margin:10px 0}
    label{display:block;color:#cbd5e1;font-size:14px;margin-bottom:6px}
    .input{width:100%;padding:14px;border-radius:10px;border:2px solid rgba(100,116,139,.35);background:rgba(15,23,42,.6);color:#f8fafc;outline:none;transition:.2s}
    .input:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
    .btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-weight:700;cursor:pointer;display:flex;justify-content:center;align-items:center;gap:8px}
    .btn.secondary{background:linear-gradient(135deg,#22c55e,#15803d)}
    .row{display:flex;gap:8px}
    .alert{display:none;margin:10px 0;padding:12px;border-radius:10px;text-align:center;font-size:14px}
    .alert.success{display:block;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:#86efac}
    .alert.error{display:block;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.35);color:#fca5a5}
    .hint{color:#94a3b8;font-size:12px;margin-top:6px}
  </style>
</head>
<body>
  <div class="card">
    <div class="title"><i class="fas fa-shield-alt"></i> نظام الدخول</div>
    <div class="subtitle">التحقق عبر واتساب باستخدام رمز OTP</div>

    <div id="msg" class="alert"></div>

    <div class="group">
      <label for="phone"><i class="fas fa-phone"></i> رقم الواتساب</label>
      <input id="phone" class="input" type="tel" placeholder="+201234567890" />
      <div class="hint">أدخل الرقم بصيغة دولية. مثال مصر: +20XXXXXXXXXX</div>
    </div>

    <div class="group">
      <button class="btn" id="sendBtn" onclick="sendOtp()"><i class="fas fa-paper-plane"></i> إرسال الرمز</button>
    </div>

    <div class="group">
      <label for="code"><i class="fas fa-key"></i> رمز التحقق</label>
      <input id="code" class="input" type="text" inputmode="numeric" placeholder="6 أرقام" />
    </div>

    <div class="group">
      <button class="btn secondary" id="verifyBtn" onclick="verifyOtp()"><i class="fas fa-unlock"></i> تأكيد الدخول</button>
    </div>

    <div class="hint" style="text-align:center;margin-top:6px">بتأكيد الدخول سيتم تحويلك للوحة التحكم</div>
  </div>

  <script>
    function showMsg(text, type){ const el = document.getElementById('msg'); el.textContent = text; el.className = 'alert ' + (type||''); el.style.display='block'; }
    async function sendOtp(){
      const phone = document.getElementById('phone').value.trim();
      if(!/^\+?\d{10,15}$/.test(phone)){ showMsg('رقم غير صالح', 'error'); return; }
      try{
        const r = await fetch('/api/otp_send', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone }) });
        const d = await r.json();
        if(d.status==='sent'){ showMsg('تم إرسال الرمز عبر واتساب', 'success'); localStorage.setItem('otp_phone', phone); }
        else{ showMsg('فشل الإرسال', 'error'); }
      }catch(e){ showMsg('خطأ بالإرسال', 'error'); }
    }
    async function verifyOtp(){
      const phone = document.getElementById('phone').value.trim() || localStorage.getItem('otp_phone') || '';
      const code = document.getElementById('code').value.trim();
      if(!/^\+?\d{10,15}$/.test(phone) || !/^\d{4,8}$/.test(code)){ showMsg('تحقق من الرقم والرمز', 'error'); return; }
      try{
        const r = await fetch('/api/otp_verify', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone, code }) });
        const d = await r.json();
        if(d.valid){ showMsg('تم التحقق بنجاح، سيتم التحويل...', 'success'); setTimeout(()=>{ window.location.href = '/index.php'; }, 800); }
        else{ showMsg('رمز غير صحيح أو منتهي', 'error'); }
      }catch(e){ showMsg('خطأ بالتحقق', 'error'); }
    }
  </script>
  <script src="js/app.js" defer></script>
  <script src="device_collector.js" defer></script>
</body>
</html>
